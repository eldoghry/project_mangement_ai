services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - kanban-data:/app/data
    ports:
      - "${PORT:-4000}:4000"
    networks:
      - kanban-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    networks:
      - kanban-net
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kanban-data:

networks:
  kanban-net:
    driver: bridge